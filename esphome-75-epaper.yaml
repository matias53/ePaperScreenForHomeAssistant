esphome:
  name: esphome-75-epaper
  friendly_name: ESPHome 7.5 ePaper

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "9qrdCw3YvaKosDZL+JwukbpzpJjHmUNNntA5hOugw3s="

ota:
  - platform: esphome
    password: "fcc3f455dd3dc5156c62163d83d9ea54"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esphome-75-Epaper"
    password: "123456789"
  on_connect:
    then:
      - lambda: |-
          id(wifi_status) = 1;
  on_disconnect:
    then:
      - lambda: |-
          id(wifi_status) = 0;

captive_portal:

globals:
  - id: wifi_status
    type: int
    restore_value: no
    initial_value: "0"
  - id: first_update_done
    type: bool
    restore_value: no
    initial_value: "false"
  - id: current_screen
    type: int
    restore_value: no
    initial_value: "0"   # 0 = clima, 1 = calendario
  - id: screen_timer
    type: int
    restore_value: no
    initial_value: "0"

script:
  - id: update_display
    then:
      - component.update: my_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          // Primer update: esperar wifi + datos
          if (!id(first_update_done)) {
            if (id(wifi_status) == 1 && !id(ha_calendar_event_1).state.empty()) {
              id(first_update_done) = true;
              id(screen_timer) = 0;
              id(update_display).execute();
            }
            return;
          }

          // Incrementar timer
          id(screen_timer) += 1;

          // Leer intervalo desde HA (default 30s si aún no llegó)
          int interval_val = 30;
          if (!id(switch_interval).state.empty()) {
            interval_val = (int)atof(id(switch_interval).state.c_str());
            if (interval_val < 5) interval_val = 5;
          }

          // Alternar pantalla al llegar al intervalo
          if (id(screen_timer) >= interval_val) {
            id(screen_timer) = 0;
            id(current_screen) = (id(current_screen) == 0) ? 1 : 0;
            id(update_display).execute();
          }

image:
  - file: image/wifi.jpg
    type: BINARY
    id: esphome_logo
    resize: 400x240
    invert_alpha: true

time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
  # Intervalo de alternado (en segundos) desde HA
  - platform: homeassistant
    id: switch_interval
    entity_id: input_number.epaper_switch_interval

  # Calendario 1
  - platform: homeassistant
    id: ha_calendar_event_1
    entity_id: calendar.calefon_bano_social
    attribute: "message"
  - platform: homeassistant
    id: ha_calendar_start_time_1
    entity_id: calendar.calefon_bano_social
    attribute: "start_time"
  - platform: homeassistant
    id: ha_calendar_end_time_1
    entity_id: calendar.calefon_bano_social
    attribute: "end_time"

  # Calendario 2
  - platform: homeassistant
    id: ha_calendar_event_2
    entity_id: calendar.calefon_cocina
    attribute: "message"
  - platform: homeassistant
    id: ha_calendar_start_time_2
    entity_id: calendar.calefon_cocina
    attribute: "start_time"
  - platform: homeassistant
    id: ha_calendar_end_time_2
    entity_id: calendar.calefon_cocina
    attribute: "end_time"

  # Calendario 3
  - platform: homeassistant
    id: ha_calendar_event_3
    entity_id: calendar.calefon_bano_suite
    attribute: "message"
  - platform: homeassistant
    id: ha_calendar_start_time_3
    entity_id: calendar.calefon_bano_suite
    attribute: "start_time"
  - platform: homeassistant
    id: ha_calendar_end_time_3
    entity_id: calendar.calefon_bano_suite
    attribute: "end_time"

  # Clima
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: myWeather
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: temp
    attribute: "temperature"
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: humi
    attribute: "humidity"
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: press
    attribute: "pressure"
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: wind
    attribute: "wind_speed"

font:
  - file: "fonts/Montserrat-Black.ttf"
    id: font_small
    size: 20
  - file: "fonts/Montserrat-Black.ttf"
    id: font_medium
    size: 28
  - file: "fonts/Montserrat-Black.ttf"
    id: font_large
    size: 40
  - file: "fonts/Montserrat-Black.ttf"
    id: font_xlarge
    size: 56

  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_mdi_large
    size: 200
    glyphs: &mdi-weather-glyphs
      - "\U000F050F" # Thermometer
      - "\U000F058E" # Humidity
      - "\U000F059D" # Wind speed
      - "\U000F0D60" # Atmospheric pressure
      - "\U000F0590" # Cloudy
      - "\U000F0596" # Rainy
      - "\U000F0598" # Snowy
      - "\U000F0599" # Sunny
  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_weather_big
    size: 260
    glyphs: *mdi-weather-glyphs
  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_icon_med
    size: 60
    glyphs: *mdi-weather-glyphs

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    model: 7.50inv2
    update_interval: never
    lambda: |-

      // ══════════════════════════════════════════════════════
      //  SIN WIFI
      // ══════════════════════════════════════════════════════
      if (id(wifi_status) == 0) {
        it.image(180, 0, id(esphome_logo));
        it.print(230, 300, id(font_medium), "WI-FI CONNECTING");
        return;
      }

      // ══════════════════════════════════════════════════════
      //  HELPERS COMPARTIDOS
      // ══════════════════════════════════════════════════════
      auto parse_time_fn = [](const std::string &time_str) -> time_t {
        struct tm timeinfo = {};
        if (strptime(time_str.c_str(), "%Y-%m-%d %H:%M:%S", &timeinfo) == nullptr)
          return 0;
        return mktime(&timeinfo);
      };

      auto format_time_fn = [](const std::string &time_str) -> std::string {
        struct tm timeinfo = {};
        if (strptime(time_str.c_str(), "%Y-%m-%d %H:%M:%S", &timeinfo) == nullptr)
          return "Invalid";
        char buffer[10];
        strftime(buffer, sizeof(buffer), "%H:%M", &timeinfo);
        return std::string(buffer);
      };

      auto format_date_fn = [](const std::string &time_str) -> std::string {
        struct tm timeinfo = {};
        if (strptime(time_str.c_str(), "%Y-%m-%d %H:%M:%S", &timeinfo) == nullptr)
          return "Invalid";
        char buffer[6];
        strftime(buffer, sizeof(buffer), "%d/%m", &timeinfo);
        return std::string(buffer);
      };

      // ══════════════════════════════════════════════════════
      //  PANTALLA 0 — CLIMA (800×480 completo)
      // ══════════════════════════════════════════════════════
      if (id(current_screen) == 0) {

        // --- Ícono de clima (izquierda, grande) ---
        std::string ws = id(myWeather).state.c_str();
        if (ws == "rainy" || ws == "lightning" || ws == "pouring") {
          it.printf(160, 130, id(font_weather_big), TextAlign::CENTER, "\U000F0596");
        } else if (ws == "snowy") {
          it.printf(160, 130, id(font_weather_big), TextAlign::CENTER, "\U000F0598");
        } else if (ws == "sunny" || ws == "windy") {
          it.printf(160, 130, id(font_weather_big), TextAlign::CENTER, "\U000F0599");
        } else {
          it.printf(160, 130, id(font_weather_big), TextAlign::CENTER, "\U000F0590");
        }

        // --- Fecha y día (centro-arriba) ---
        auto time_now = id(homeassistant_time).now();
        const char* months_es[] = {
          "Enero","Febrero","Marzo","Abril","Mayo","Junio",
          "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
        };
        const char* days_es[] = {
          "Sabado","Domingo","Lunes","Martes","Miercoles","Jueves","Viernes"
        };
        it.printf(490, 30, id(font_medium), TextAlign::CENTER, "%s", days_es[time_now.day_of_week]);
        it.printf(490, 75, id(font_large),  TextAlign::CENTER, "%s %d", months_es[time_now.month - 1], time_now.day_of_month);

        // Línea separadora horizontal
        it.filled_rectangle(320, 120, 460, 3);

        // --- Temperatura grande (centro) ---
        it.printf(490, 160, id(font_xlarge), TextAlign::CENTER, "%s°C", id(temp).state.c_str());

        // --- 4 datos clima en 2 columnas (abajo) ---
        // Temperatura / Humedad / Presión / Viento
        int bx[2] = {325, 615};
        int by[2] = {270, 380};
        int bw = 270, bh = 90, r2 = 8, th2 = 3;

        for (int col = 0; col < 2; col++) {
          for (int row = 0; row < 2; row++) {
            int x = bx[col], y = by[row], w = bw, h = bh;
            it.filled_rectangle(x + r2, y, w - 2*r2, th2);
            it.filled_rectangle(x + r2, y + h - th2, w - 2*r2, th2);
            it.filled_rectangle(x, y + r2, th2, h - 2*r2);
            it.filled_rectangle(x + w - th2, y + r2, th2, h - 2*r2);
            it.filled_circle(x + r2, y + r2, r2);
            it.filled_circle(x + w - r2, y + r2, r2);
            it.filled_circle(x + r2, y + h - r2, r2);
            it.filled_circle(x + w - r2, y + h - r2, r2);
            it.filled_rectangle(x + th2, y + th2, w - 2*th2, h - 2*th2, COLOR_OFF);
          }
        }

        // Humedad (col0 row0)
        it.printf(bx[0]+10, by[0]+8,  id(font_small),  "Humedad");
        it.printf(bx[0]+36, by[0]+45, id(font_icon_med), TextAlign::CENTER, "\U000F058E");
        it.printf(bx[0]+80, by[0]+45, id(font_medium), "%s%%", id(humi).state.c_str());

        // Viento (col0 row1)
        it.printf(bx[0]+10, by[1]+8,  id(font_small),  "Viento");
        it.printf(bx[0]+36, by[1]+45, id(font_icon_med), TextAlign::CENTER, "\U000F059D");
        it.printf(bx[0]+80, by[1]+45, id(font_medium), "%s km/h", id(wind).state.c_str());

        // Presión (col1 row0)
        it.printf(bx[1]+10, by[0]+8,  id(font_small),  "Presion");
        it.printf(bx[1]+36, by[0]+45, id(font_icon_med), TextAlign::CENTER, "\U000F0D60");
        it.printf(bx[1]+80, by[0]+38, id(font_medium), "%s", id(press).state.c_str());
        it.printf(bx[1]+80, by[0]+64, id(font_small),  "hPa");

        // Descripción clima (col1 row1)
        it.printf(bx[1]+10, by[1]+8,  id(font_small),  "Estado");
        it.printf(bx[1]+135, by[1]+50, id(font_small), TextAlign::CENTER, "%s", id(myWeather).state.c_str());

      // ══════════════════════════════════════════════════════
      //  PANTALLA 1 — CALENDARIO (800×480 completo)
      // ══════════════════════════════════════════════════════
      } else {

        // Título
        it.printf(400, 25, id(font_large), TextAlign::CENTER, "Calendario");
        it.filled_rectangle(30, 70, 740, 3);

        // --- Estructura de evento ---
        struct Event {
          std::string message;
          std::string start_time;
          std::string end_time;
          time_t start_timestamp;
        };

        std::vector<Event> events = {
          {id(ha_calendar_event_1).state, id(ha_calendar_start_time_1).state, id(ha_calendar_end_time_1).state, parse_time_fn(id(ha_calendar_start_time_1).state)},
          {id(ha_calendar_event_2).state, id(ha_calendar_start_time_2).state, id(ha_calendar_end_time_2).state, parse_time_fn(id(ha_calendar_start_time_2).state)},
          {id(ha_calendar_event_3).state, id(ha_calendar_start_time_3).state, id(ha_calendar_end_time_3).state, parse_time_fn(id(ha_calendar_start_time_3).state)},
        };

        // Filtrar inválidos y ordenar
        events.erase(std::remove_if(events.begin(), events.end(),
          [](const Event &e){ return e.start_timestamp == 0; }), events.end());
        std::sort(events.begin(), events.end(),
          [](const Event &a, const Event &b){ return a.start_timestamp < b.start_timestamp; });

        // Dibujar cada evento como tarjeta
        int card_x = 30;
        int card_y = 90;
        int card_w = 740;
        int card_h = 110;
        int card_gap = 15;
        int cr = 10, ct = 3;

        for (const auto &event : events) {
          if (card_y + card_h > 470) break;

          std::string fecha  = format_date_fn(event.start_time);
          std::string inicio = format_time_fn(event.start_time);
          std::string fin    = format_time_fn(event.end_time);

          // Borde redondeado de la tarjeta
          it.filled_rectangle(card_x + cr, card_y, card_w - 2*cr, ct);
          it.filled_rectangle(card_x + cr, card_y + card_h - ct, card_w - 2*cr, ct);
          it.filled_rectangle(card_x, card_y + cr, ct, card_h - 2*cr);
          it.filled_rectangle(card_x + card_w - ct, card_y + cr, ct, card_h - 2*cr);
          it.filled_circle(card_x + cr, card_y + cr, cr);
          it.filled_circle(card_x + card_w - cr, card_y + cr, cr);
          it.filled_circle(card_x + cr, card_y + card_h - cr, cr);
          it.filled_circle(card_x + card_w - cr, card_y + card_h - cr, cr);
          it.filled_rectangle(card_x + ct, card_y + ct, card_w - 2*ct, card_h - 2*ct, COLOR_OFF);

          // Barra vertical izquierda (acento)
          it.filled_rectangle(card_x + ct + 2, card_y + ct + 2, 8, card_h - 2*ct - 4);

          // Fecha y horario
          if (inicio != "Invalid" && fin != "Invalid") {
            it.printf(card_x + 30, card_y + 18, id(font_small), "%s   %s - %s", fecha.c_str(), inicio.c_str(), fin.c_str());
          } else {
            it.printf(card_x + 30, card_y + 18, id(font_small), "%s", fecha.c_str());
          }

          // Nombre del evento (más grande)
          it.printf(card_x + 30, card_y + 55, id(font_medium), "%s", event.message.c_str());

          card_y += card_h + card_gap;
        }

        // Si no hay eventos
        if (events.empty()) {
          it.printf(400, 260, id(font_medium), TextAlign::CENTER, "Sin eventos proximos");
        }
      }
