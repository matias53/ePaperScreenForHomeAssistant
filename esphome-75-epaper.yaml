esphome:
  name: esphome-75-epaper
  friendly_name: ESPHome 7.5 ePaper

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "9qrdCw3YvaKosDZL+JwukbpzpJjHmUNNntA5hOugw3s="

ota:
  - platform: esphome
    password: "fcc3f455dd3dc5156c62163d83d9ea54"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Esphome-75-Epaper"
    password: "123456789"
  on_connect:
    then:
      - lambda: |-
          id(wifi_status) = 1;
  on_disconnect:
    then:
      - lambda: |-
          id(wifi_status) = 0;

captive_portal:

globals:
  - id: wifi_status
    type: int
    restore_value: no
    initial_value: "0"
  - id: first_update_done
    type: bool
    restore_value: no
    initial_value: "false"
  - id: current_screen
    type: int
    restore_value: no
    initial_value: "0"   # 0 = clima, 1 = calendario
  - id: screen_timer
    type: int
    restore_value: no
    initial_value: "0"

script:
  - id: update_display
    then:
      - component.update: my_display

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(first_update_done)) {
            if (id(wifi_status) == 1 && !id(ha_calendar_event_1).state.empty()) {
              id(first_update_done) = true;
              id(screen_timer) = 0;
              id(update_display).execute();
            }
            return;
          }

          id(screen_timer) += 1;

          int interval_val = 30;
          if (!id(switch_interval).state.empty()) {
            interval_val = (int)atof(id(switch_interval).state.c_str());
            if (interval_val < 5) interval_val = 5;
          }

          if (id(screen_timer) >= interval_val) {
            id(screen_timer) = 0;
            id(current_screen) = (id(current_screen) == 0) ? 1 : 0;
            id(update_display).execute();
          }

image:
  - file: image/wifi.jpg
    type: BINARY
    id: esphome_logo
    resize: 400x240
    invert_alpha: true

time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
  - platform: homeassistant
    id: switch_interval
    entity_id: input_number.epaper_switch_interval

  - platform: homeassistant
    id: ha_calendar_event_1
    entity_id: calendar.calefon_bano_social
    attribute: "message"
  - platform: homeassistant
    id: ha_calendar_start_time_1
    entity_id: calendar.calefon_bano_social
    attribute: "start_time"
  - platform: homeassistant
    id: ha_calendar_end_time_1
    entity_id: calendar.calefon_bano_social
    attribute: "end_time"

  - platform: homeassistant
    id: ha_calendar_event_2
    entity_id: calendar.calefon_cocina
    attribute: "message"
  - platform: homeassistant
    id: ha_calendar_start_time_2
    entity_id: calendar.calefon_cocina
    attribute: "start_time"
  - platform: homeassistant
    id: ha_calendar_end_time_2
    entity_id: calendar.calefon_cocina
    attribute: "end_time"

  - platform: homeassistant
    id: ha_calendar_event_3
    entity_id: calendar.calefon_bano_suite
    attribute: "message"
  - platform: homeassistant
    id: ha_calendar_start_time_3
    entity_id: calendar.calefon_bano_suite
    attribute: "start_time"
  - platform: homeassistant
    id: ha_calendar_end_time_3
    entity_id: calendar.calefon_bano_suite
    attribute: "end_time"

  - platform: homeassistant
    entity_id: weather.forecast_home
    id: myWeather
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: temp
    attribute: "temperature"
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: humi
    attribute: "humidity"
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: press
    attribute: "pressure"
  - platform: homeassistant
    entity_id: weather.forecast_home
    id: wind
    attribute: "wind_speed"

font:
  - file: "fonts/Montserrat-Black.ttf"
    id: font_small
    size: 20
  - file: "fonts/Montserrat-Black.ttf"
    id: font_medium
    size: 28
  - file: "fonts/Montserrat-Black.ttf"
    id: font_large
    size: 38
  - file: "fonts/Montserrat-Black.ttf"
    id: font_xlarge
    size: 65

  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_weather_big
    size: 230
    glyphs: &mdi-weather-glyphs
      - "\U000F050F" # Thermometer
      - "\U000F058E" # Humidity
      - "\U000F059D" # Wind speed
      - "\U000F0D60" # Atmospheric pressure
      - "\U000F0590" # Cloudy
      - "\U000F0596" # Rainy
      - "\U000F0598" # Snowy
      - "\U000F0599" # Sunny
  - file: 'fonts/materialdesignicons-webfont.ttf'
    id: font_icon_med
    size: 50
    glyphs: *mdi-weather-glyphs

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    model: 7.50inv2
    update_interval: never
    lambda: |-

      // ══════════════════════════════════════════════════════
      //  SIN WIFI
      // ══════════════════════════════════════════════════════
      if (id(wifi_status) == 0) {
        it.image(180, 0, id(esphome_logo));
        it.print(230, 300, id(font_medium), "WI-FI CONNECTING");
        return;
      }

      // ══════════════════════════════════════════════════════
      //  HELPERS COMPARTIDOS
      // ══════════════════════════════════════════════════════
      auto parse_time_fn = [](const std::string &time_str) -> time_t {
        struct tm timeinfo = {};
        if (strptime(time_str.c_str(), "%Y-%m-%d %H:%M:%S", &timeinfo) == nullptr)
          return 0;
        return mktime(&timeinfo);
      };

      auto format_time_fn = [](const std::string &time_str) -> std::string {
        struct tm timeinfo = {};
        if (strptime(time_str.c_str(), "%Y-%m-%d %H:%M:%S", &timeinfo) == nullptr)
          return "?";
        char buffer[10];
        strftime(buffer, sizeof(buffer), "%H:%M", &timeinfo);
        return std::string(buffer);
      };

      auto format_date_fn = [](const std::string &time_str) -> std::string {
        struct tm timeinfo = {};
        if (strptime(time_str.c_str(), "%Y-%m-%d %H:%M:%S", &timeinfo) == nullptr)
          return "?";
        char buffer[6];
        strftime(buffer, sizeof(buffer), "%d/%m", &timeinfo);
        return std::string(buffer);
      };

      // ══════════════════════════════════════════════════════
      //  PANTALLA 0 — CLIMA
      //  Izquierda  x=0..305   → ícono clima
      //  Derecha    x=315..800 → fecha/hora, temp, 4 tarjetas
      // ══════════════════════════════════════════════════════
      if (id(current_screen) == 0) {

        // --- Ícono clima (columna izquierda, centrado en x=155) ---
        // font_weather_big size=230: el glifo mide ~220px de ancho
        // TextAlign::CENTER usa x como centro horizontal
        std::string ws = id(myWeather).state.c_str();
        const char* weather_icon;
        if (ws == "rainy" || ws == "lightning" || ws == "pouring") {
          weather_icon = "\U000F0596";
        } else if (ws == "snowy") {
          weather_icon = "\U000F0598";
        } else if (ws == "sunny" || ws == "windy") {
          weather_icon = "\U000F0599";
        } else {
          weather_icon = "\U000F0590";
        }
        it.printf(155, 230, id(font_weather_big), TextAlign::CENTER, "%s", weather_icon);

        // Descripción estado debajo del ícono
        it.printf(155, 400, id(font_small), TextAlign::CENTER, "%s", id(myWeather).state.c_str());

        // --- Línea divisoria vertical ---
        it.filled_rectangle(308, 15, 4, 450);

        // ── Columna derecha: x_inicio=320, ancho disponible=480 ──

        auto time_now = id(homeassistant_time).now();

        const char* days_es[] = {
          "Sabado","Domingo","Lunes","Martes",
          "Miercoles","Jueves","Viernes"
        };
        const char* months_es[] = {
          "Enero","Febrero","Marzo","Abril","Mayo","Junio",
          "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
        };

        // Día de semana (pequeño)
        it.printf(325, 20, id(font_small), "%s", days_es[time_now.day_of_week]);

        // Fecha (izquierda) + Hora (derecha) en la misma línea y=65
        char hora_buf[6];
        snprintf(hora_buf, sizeof(hora_buf), "%02d:%02d", time_now.hour, time_now.minute);
        it.printf(325, 65, id(font_large), "%s %d", months_es[time_now.month - 1], time_now.day_of_month);
        it.printf(775, 65, id(font_large), TextAlign::RIGHT, "%s", hora_buf);

        // Línea separadora
        it.filled_rectangle(320, 103, 470, 3);

        // Temperatura grande centrada en columna derecha (centro = 320 + 240 = 560)
        it.printf(555, 175, id(font_xlarge), TextAlign::CENTER, "%s°C", id(temp).state.c_str());

        // Línea separadora
        it.filled_rectangle(320, 218, 470, 3);

        // ── 4 tarjetas (2 columnas × 2 filas) ──
        // col0: x=325   col1: x=550   ancho=215   alto=105
        // fil0: y=228   fil1: y=348
        // borde derecho: 550 + 215 = 765 ✓ (< 800)
        // borde inferior: 348 + 105 = 453 ✓ (< 480)

        const int cx[2] = {325, 550};
        const int cy[2] = {228, 348};
        const int cw = 215, ch = 105, cr = 8, ct = 3;

        auto draw_card = [&](int x, int y, int w, int h, int r, int t) {
          it.filled_rectangle(x + r, y, w - 2*r, t);
          it.filled_rectangle(x + r, y + h - t, w - 2*r, t);
          it.filled_rectangle(x, y + r, t, h - 2*r);
          it.filled_rectangle(x + w - t, y + r, t, h - 2*r);
          it.filled_circle(x + r, y + r, r);
          it.filled_circle(x + w - r, y + r, r);
          it.filled_circle(x + r, y + h - r, r);
          it.filled_circle(x + w - r, y + h - r, r);
          it.filled_rectangle(x + t, y + t, w - 2*t, h - 2*t, COLOR_OFF);
          // barra acento izquierda
          it.filled_rectangle(x + t + 1, y + t + 1, 6, h - 2*t - 2);
        };

        // Humedad  (col0, fil0)
        draw_card(cx[0], cy[0], cw, ch, cr, ct);
        it.printf(cx[0]+20, cy[0]+12, id(font_small),  "Humedad");
        it.printf(cx[0]+20, cy[0]+55, id(font_medium), "%s%%", id(humi).state.c_str());

        // Viento   (col1, fil0)
        draw_card(cx[1], cy[0], cw, ch, cr, ct);
        it.printf(cx[1]+20, cy[0]+12, id(font_small),  "Viento");
        it.printf(cx[1]+20, cy[0]+55, id(font_medium), "%s km/h", id(wind).state.c_str());

        // Presion  (col0, fil1)
        draw_card(cx[0], cy[1], cw, ch, cr, ct);
        it.printf(cx[0]+20, cy[1]+12, id(font_small),  "Presion");
        it.printf(cx[0]+20, cy[1]+50, id(font_medium), "%s", id(press).state.c_str());
        it.printf(cx[0]+20, cy[1]+80, id(font_small),  "hPa");

        // Estado   (col1, fil1)
        draw_card(cx[1], cy[1], cw, ch, cr, ct);
        it.printf(cx[1]+20, cy[1]+12, id(font_small),  "Estado");
        it.printf(cx[1]+20, cy[1]+55, id(font_medium), "%s", id(myWeather).state.c_str());

      // ══════════════════════════════════════════════════════
      //  PANTALLA 1 — CALENDARIO
      // ══════════════════════════════════════════════════════
      } else {

        it.printf(400, 25, id(font_large), TextAlign::CENTER, "Calendario");
        it.filled_rectangle(30, 68, 740, 3);

        struct Event {
          std::string message;
          std::string start_time;
          std::string end_time;
          time_t start_timestamp;
        };

        std::vector<Event> events = {
          {id(ha_calendar_event_1).state, id(ha_calendar_start_time_1).state, id(ha_calendar_end_time_1).state, parse_time_fn(id(ha_calendar_start_time_1).state)},
          {id(ha_calendar_event_2).state, id(ha_calendar_start_time_2).state, id(ha_calendar_end_time_2).state, parse_time_fn(id(ha_calendar_start_time_2).state)},
          {id(ha_calendar_event_3).state, id(ha_calendar_start_time_3).state, id(ha_calendar_end_time_3).state, parse_time_fn(id(ha_calendar_start_time_3).state)},
        };

        events.erase(std::remove_if(events.begin(), events.end(),
          [](const Event &e){ return e.start_timestamp == 0; }), events.end());
        std::sort(events.begin(), events.end(),
          [](const Event &a, const Event &b){ return a.start_timestamp < b.start_timestamp; });

        int card_x = 30;
        int card_y = 82;
        const int card_w = 740, card_h = 115, card_gap = 12;
        const int cr2 = 10, ct2 = 3;

        for (const auto &event : events) {
          if (card_y + card_h > 472) break;

          std::string fecha  = format_date_fn(event.start_time);
          std::string inicio = format_time_fn(event.start_time);
          std::string fin    = format_time_fn(event.end_time);

          it.filled_rectangle(card_x + cr2, card_y, card_w - 2*cr2, ct2);
          it.filled_rectangle(card_x + cr2, card_y + card_h - ct2, card_w - 2*cr2, ct2);
          it.filled_rectangle(card_x, card_y + cr2, ct2, card_h - 2*cr2);
          it.filled_rectangle(card_x + card_w - ct2, card_y + cr2, ct2, card_h - 2*cr2);
          it.filled_circle(card_x + cr2, card_y + cr2, cr2);
          it.filled_circle(card_x + card_w - cr2, card_y + cr2, cr2);
          it.filled_circle(card_x + cr2, card_y + card_h - cr2, cr2);
          it.filled_circle(card_x + card_w - cr2, card_y + card_h - cr2, cr2);
          it.filled_rectangle(card_x + ct2, card_y + ct2, card_w - 2*ct2, card_h - 2*ct2, COLOR_OFF);
          it.filled_rectangle(card_x + ct2 + 1, card_y + ct2 + 1, 8, card_h - 2*ct2 - 2);

          if (inicio != "?" && fin != "?") {
            it.printf(card_x + 28, card_y + 16, id(font_small), "%s   %s - %s", fecha.c_str(), inicio.c_str(), fin.c_str());
          } else {
            it.printf(card_x + 28, card_y + 16, id(font_small), "%s", fecha.c_str());
          }

          it.printf(card_x + 28, card_y + 58, id(font_medium), "%s", event.message.c_str());

          card_y += card_h + card_gap;
        }

        if (events.empty()) {
          it.printf(400, 260, id(font_medium), TextAlign::CENTER, "Sin eventos proximos");
        }
      }
